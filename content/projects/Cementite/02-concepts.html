<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Core Concepts Reference · Cementite KV-DB</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d0d1a; font-family: 'JetBrains Mono','Fira Code',monospace; color: #e2e8f0; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0d0d1a; }
    ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const concepts = [
      {
        id: 'rum', title: 'RUM Conjecture', color: '#f59e0b',
        tldr: 'You can optimize any 2 of: Read overhead, Update overhead, Memory overhead — but the 3rd will suffer. This is why no single DB is best at everything.',
        sections: [
          {
            title: 'What it says',
            content: [
              { type: 'text', text: 'Every storage system has three cost axes:' },
              { type: 'table', headers: ['Axis', 'Symbol', 'B-Tree', 'LSM', 'Bitcask'], rows: [
                ['Read Amplification', 'R', '1-2×', '5-10×', '1×'],
                ['Update/Write Amp', 'U', '2-5×', '10-30×', '1-2×'],
                ['Memory Amplification', 'M', 'Page cache', 'MemTable+Bloom', 'ALL keys in RAM'],
              ]},
              { type: 'text', text: 'Optimizing R+U increases M. Optimizing R+M increases U. Optimizing U+M increases R. Pick two.' },
            ]
          },
          {
            title: 'How real DBs make this choice',
            content: [
              { type: 'list', items: [
                'Bitcask minimizes R (1 seek) and U (sequential write) → pays with M (all keys in RAM)',
                'LSM minimizes U (sequential) and M (MemTable only) → pays with R (multiple SSTables)',
                'B-Tree minimizes R (3-4 reads) and M (page cache) → pays with U (random in-place writes)',
              ]}
            ]
          },
          {
            title: 'Why this matters for your build',
            content: [
              { type: 'text', text: 'Every optimization you add, ask: which of R, U, M am I improving? And which one am I making worse?' },
              { type: 'list', items: [
                'Bloom filter → improves R, costs M (~10 bits/key extra RAM)',
                'Tiered compaction → improves U, worsens R',
                'Mmap SSTable reads → improves R latency, uses OS page cache (M)',
                'Group commit WAL → improves U throughput, no real cost',
              ]}
            ]
          }
        ]
      },
      {
        id: 'wal', title: 'Write-Ahead Log (WAL)', color: '#06b6d4',
        tldr: 'Before writing data anywhere, write what you\'re ABOUT to do to a log. If you crash, replay the log.',
        sections: [
          {
            title: 'The core problem WAL solves',
            content: [
              { type: 'text', text: 'Without WAL: crash after MemTable update but before disk = data loss. In-memory state is gone forever.' },
              { type: 'timeline', items: [
                { t: 'T=0', label: 'User write arrives' },
                { t: 'T=1μs', label: 'Append to WAL + fsync', highlight: true },
                { t: 'T=2μs', label: 'Acknowledge to user' },
                { t: 'T=3μs', label: 'Update MemTable (crash here = safe, WAL has it)' },
                { t: 'CRASH', label: 'Replay WAL on restart → MemTable reconstructed', danger: true },
              ]}
            ]
          },
          {
            title: 'WAL Record Format',
            content: [
              { type: 'byteformat', fields: [
                { label: 'Length', bytes: '4B', color: '#f59e0b' },
                { label: 'CRC32C', bytes: '4B', color: '#06b6d4' },
                { label: 'Type', bytes: '1B', color: '#22c55e' },
                { label: 'Seq#', bytes: '8B', color: '#ec4899' },
                { label: 'key_len', bytes: '4B', color: '#8b5cf6' },
                { label: 'val_len', bytes: '4B', color: '#8b5cf6' },
                { label: 'key', bytes: 'var', color: '#94a3b8' },
                { label: 'value', bytes: 'var', color: '#94a3b8' },
              ]},
              { type: 'list', items: [
                '0x05 = SET, 0x06 = DELETE, 0x07 = BATCH, 0x08 = CHECKPOINT',
                'CRC32C covers all fields after it — detects torn writes',
                'Sequence# is monotonically increasing — critical for MVCC',
              ]}
            ]
          },
          {
            title: 'fsync and the durability ladder',
            content: [
              { type: 'table', headers: ['Level', 'Method', 'Speed', 'Safety', 'Example DB'], rows: [
                ['0', 'No fsync (buffered)', '1M+ writes/s', 'Loses OS crash', 'Redis default'],
                ['1', 'fsync per write', '5-10K writes/s', 'Crash safe', 'SQLite FULL'],
                ['2', 'Group commit', '100-500K writes/s', 'Crash safe', 'MySQL, RocksDB'],
              ]},
              { type: 'code', text: 'file.sync_data() // fdatasync — faster, skips metadata\nfile.sync_all()  // fsync — syncs metadata too (file size, mtime)' }
            ]
          }
        ]
      },
      {
        id: 'lsm', title: 'LSM-Tree Architecture', color: '#22c55e',
        tldr: 'Never update data in place. Write to memory first, batch to sorted disk files, merge them in the background.',
        sections: [
          {
            title: 'The write path',
            content: [
              { type: 'flow', steps: ['WAL append (durability)', 'MemTable insert (in-memory BTreeMap)', 'Background: MemTable full → flush to SSTable L0', 'Background: L0 full → compact into L1', '...'] }
            ]
          },
          {
            title: 'The read path',
            content: [
              { type: 'flow', steps: ['Check MemTable', 'Check immutable MemTables (if any)', 'L0: check Bloom, check ALL files (may overlap)', 'L1: check Bloom, binary search manifest, 1 file per range', 'L2, L3... same as L1'] }
            ]
          },
          {
            title: 'SSTable internal format',
            content: [
              { type: 'byteformat', fields: [
                { label: 'Data Blocks (4KB each, sorted KVs)', bytes: 'bulk', color: '#22c55e' },
                { label: 'Index Block (first key per block + offset)', bytes: 'small', color: '#60a5fa' },
                { label: 'Bloom Filter (10 bits/key)', bytes: 'tiny', color: '#ec4899' },
                { label: 'Footer (block offsets + magic number)', bytes: '48B', color: '#f59e0b' },
              ]},
            ]
          }
        ]
      },
      {
        id: 'compaction', title: 'Compaction Strategies', color: '#8b5cf6',
        tldr: 'Compaction merges SSTables, removes stale versions, reclaims space. The strategy is the core read vs write amp trade-off.',
        sections: [
          {
            title: 'Leveled Compaction',
            content: [
              { type: 'text', text: 'L0 files may overlap. L1-L6: NO key overlap within a level. 10× size ratio per level. L1=10MB, L2=100MB, L3=1GB.' },
              { type: 'list', items: [
                'Write amp: HIGH (10-30×) — keys often rewritten multiple times as they move down levels',
                'Read amp: LOW (1-2 files per level, Bloom reduces further) — good for read-heavy',
                'Used by: LevelDB, RocksDB default, TiKV',
              ]}
            ]
          },
          {
            title: 'Tiered (Size-Tiered) Compaction',
            content: [
              { type: 'text', text: 'When you have 4+ SSTables of similar size, merge them into 1 larger one. Tier up.' },
              { type: 'list', items: [
                'Write amp: LOW (5-10×) — keys written fewer times total',
                'Read amp: HIGH — up to O(levels × tier_size) files to check',
                'Best for: time-series, write-heavy (Cassandra default, ScyllaDB)',
              ]}
            ]
          },
          {
            title: 'FIFO Compaction',
            content: [
              { type: 'text', text: 'Delete the oldest SSTable when total size exceeds threshold. No merging.' },
              { type: 'list', items: [
                'Write amp: 1× — never rewrites data',
                'No deduplication — only valid when old data becomes irrelevant',
                'Used for: time-series logs, event streams, metrics retention windows',
              ]}
            ]
          }
        ]
      },
      {
        id: 'bloom', title: 'Bloom Filters', color: '#ec4899',
        tldr: 'Can say "this key is DEFINITELY NOT in this SSTable" in O(1) with zero disk I/O, using only ~10 bits per key.',
        sections: [
          {
            title: 'How it works',
            content: [
              { type: 'text', text: 'A bit array of m bits + k hash functions. Insert: compute k hashes → set k bits to 1. Query: compute k hashes → if any bit = 0 → definitely not here.' },
              { type: 'list', items: [
                'False negatives: IMPOSSIBLE — a key that was inserted will always return "maybe"',
                'False positives: ~1% at 10 bits/key — occasionally says "maybe" for absent keys',
                'k = floor(b × ln2) ≈ 0.693 × bits_per_key — optimal hash count',
              ]}
            ]
          },
          {
            title: 'Why it matters',
            content: [
              { type: 'table', headers: ['Scenario', 'Without Bloom', 'With Bloom'], rows: [
                ['get("nonexistent")', '20+ disk reads (7 levels)', '2 disk reads (99% skip)'],
                ['get("exists in L3")', '~5 disk reads', '~4 disk reads'],
                ['RAM cost per 1M keys', '0 bits', '10 Mbit = 1.25 MB'],
              ]}
            ]
          },
          {
            title: 'Implementation',
            content: [
              { type: 'code', text: 'struct BloomFilter {\n    bits: Vec<u8>,\n    num_bits: u64,\n    num_hashes: u32,\n}\n// Two-hash trick (Kirsch-Mitzenmacher):\n// g_i(key) = (h1(key) + i * h2(key)) % m\n// Only 2 hash computations regardless of k!' }
            ]
          }
        ]
      },
      {
        id: 'mvcc', title: 'MVCC', color: '#3b82f6',
        tldr: 'Keep multiple versions. Readers see a snapshot from the past, writers add new versions. No reader blocks a writer.',
        sections: [
          {
            title: 'The problem MVCC solves',
            content: [
              { type: 'text', text: 'Naive locking: a writer holds a lock → readers block. MVCC: readers take a snapshot (seq_no), see only versions ≤ snapshot seq. Writers never block readers.' },
              { type: 'list', items: [
                'Snapshot at seq=600 sees all entries with seq ≤ 600',
                'Writer appends (key, seq=601, value) — old snapshots unaffected',
                'Multiple readers can hold different snapshot points simultaneously',
              ]}
            ]
          },
          {
            title: 'How sequence numbers work',
            content: [
              { type: 'code', text: '// Internal key format: (user_key, seq_no)\n// Sort order: user_key ASC, seq_no DESC (newest first)\n\n// On disk for key "foo" written 3 times:\n// ("foo", 601, "value3")  ← newest\n// ("foo", 300, "value2")\n// ("foo", 100, "value1")  ← oldest\n\n// Snapshot at seq=350 sees "value2"' }
            ]
          },
          {
            title: 'Garbage collection',
            content: [
              { type: 'list', items: [
                'Track oldest active snapshot: oldest_snapshot = min of all live snapshot seq_nos',
                'During compaction: if old_version.seq < oldest_snapshot AND newer version exists → DELETE',
                'Tombstone cleanup: if tombstone.seq < oldest_snapshot → DELETE tombstone AND all old values',
                'Long-running snapshots block GC → "snapshot isolation bloat"',
              ]}
            ]
          }
        ]
      },
      {
        id: 'btree-vs-lsm', title: 'B-Tree vs LSM-Tree', color: '#f97316',
        tldr: 'B-Trees update in-place (good reads, bad writes on spinning disk). LSM always appends (great writes, needs compaction for reads).',
        sections: [
          {
            title: 'B-Tree: how it works',
            content: [
              { type: 'text', text: 'Balanced tree where every leaf is at the same depth. Nodes = disk pages (4KB). Typical fanout: 100-1000 children. Height 3-4 for billions of records.' },
              { type: 'list', items: [
                'Read: traverse root → leaf = 3-4 disk reads. Page cache usually keeps upper nodes warm.',
                'Write: find leaf (3-4 reads) + 1 random write + possible cascading splits',
                'Why random writes are slow: HDD 5-10ms seek + SSD erase-before-write penalty',
              ]}
            ]
          },
          {
            title: 'Head-to-head comparison',
            content: [
              { type: 'table', headers: ['Metric', 'B-Tree', 'LSM-Tree'], rows: [
                ['Write throughput', '★★★☆☆ (random I/O)', '★★★★★ (sequential)'],
                ['Read throughput', '★★★★★ (3-4 reads)', '★★★☆☆ (1-7 reads)'],
                ['Write amplification', '2-5×', '10-30× (leveled)'],
                ['Space amplification', '~1.3× (fragmentation)', '~1.1× (leveled)'],
                ['Range scans', 'Excellent (leaf chain)', 'Good (sorted SSTables)'],
              ]}
            ]
          },
          {
            title: 'When to choose each',
            content: [
              { type: 'list', items: [
                'LSM: writes >> reads, time-series, dataset >> RAM, OK with background I/O',
                'B-Tree: reads >> writes, predictable latency required, ACID transactions easier',
                'LMDB variant: copy-on-write B-Tree — readers are lock-free, zero read overhead',
              ]}
            ]
          }
        ]
      },
      {
        id: 'bench', title: 'Benchmarking Strategy', color: '#84cc16',
        tldr: 'A bad benchmark lies. Run YCSB-style workloads, measure p99 not just average, compare against RocksDB.',
        sections: [
          {
            title: 'The 3 numbers that matter',
            content: [
              { type: 'list', items: [
                'Throughput: ops/sec sustained over 60 seconds — not a 5-second burst',
                'Latency percentiles: p50 / p95 / p99 / p999 — NEVER just average',
                'Amplification factors: WAF = disk_writes / user_writes, RAF, SAF',
              ]},
              { type: 'text', text: 'Example: avg=0.5ms but p99=200ms means compaction stalls are killing you. Average hides the problem.' }
            ]
          },
          {
            title: 'YCSB Workload Profiles',
            content: [
              { type: 'table', headers: ['Workload', 'Mix', 'Distribution', 'Use case'], rows: [
                ['A', '50% R / 50% U', 'Zipfian', 'Session store'],
                ['B', '95% R / 5% U', 'Zipfian', 'Photo tagging'],
                ['C', '100% R', 'Zipfian', 'User profile cache'],
                ['D', '95% R / 5% I', 'Latest', 'User status'],
                ['F', '50% R / 50% RMW', 'Zipfian', 'User counter'],
              ]},
              { type: 'text', text: 'Zipfian = 20% of keys get 80% of requests. Much more realistic than uniform random.' }
            ]
          },
          {
            title: 'Benchmark harness structure',
            content: [
              { type: 'code', text: '// criterion.rs for micro-benchmarks (ns-level operations)\n// Custom harness with Instant for macro-benchmarks:\nlet mut latencies: Vec<u64> = Vec::new();\nlet start = Instant::now();\ndb.get(key)?;\nlatencies.push(start.elapsed().as_micros() as u64);\n// ...\nlatencies.sort_unstable();\nlet p99 = latencies[(0.99 * latencies.len() as f64) as usize];' }
            ]
          }
        ]
      }
    ];

    function ConceptSection({ section }) {
      const [open, setOpen] = useState(false);

      const renderContent = (item, idx) => {
        if (item.type === 'text') return (
          <p key={idx} style={{ fontSize:12.5, color:'#94a3b8', lineHeight:1.8, marginBottom:12 }}>{item.text}</p>
        );
        if (item.type === 'list') return (
          <ul key={idx} style={{ listStyle:'none', marginBottom:12 }}>
            {item.items.map((li, i) => (
              <li key={i} style={{ fontSize:12, color:'#94a3b8', lineHeight:1.7, padding:'3px 0 3px 14px', position:'relative' }}>
                <span style={{ position:'absolute', left:0, color:'#475569' }}>›</span>{li}
              </li>
            ))}
          </ul>
        );
        if (item.type === 'code') return (
          <pre key={idx} style={{ background:'#070910', border:'1px solid #1e293b', borderRadius:8, padding:'14px 16px', fontSize:11.5, color:'#7dd3fc', lineHeight:1.8, overflowX:'auto', marginBottom:12, whiteSpace:'pre' }}>{item.text}</pre>
        );
        if (item.type === 'table') return (
          <div key={idx} style={{ overflowX:'auto', marginBottom:12 }}>
            <table style={{ width:'100%', borderCollapse:'collapse', fontSize:11.5 }}>
              <thead>
                <tr>{item.headers.map(h => <th key={h} style={{ padding:'8px 12px', background:'#111827', borderBottom:'1px solid #1e293b', color:'#64748b', textAlign:'left', letterSpacing:'0.06em', fontSize:10 }}>{h}</th>)}</tr>
              </thead>
              <tbody>
                {item.rows.map((row, ri) => (
                  <tr key={ri} style={{ borderBottom:'1px solid #0f172a' }}>
                    {row.map((cell, ci) => (
                      <td key={ci} style={{ padding:'8px 12px', color: ci === 0 ? '#e2e8f0' : '#64748b', background: ri % 2 === 0 ? 'rgba(255,255,255,0.01)' : 'transparent' }}>{cell}</td>
                    ))}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        );
        if (item.type === 'byteformat') return (
          <div key={idx} style={{ marginBottom:12 }}>
            <div style={{ display:'flex', borderRadius:8, overflow:'hidden', border:'1px solid #1e293b' }}>
              {item.fields.map((f, fi) => (
                <div key={fi} style={{ flex:1, minWidth: f.bytes === 'bulk' ? 140 : f.bytes === 'var' ? 80 : 60, borderRight: fi < item.fields.length - 1 ? '1px solid #1e293b' : 'none', background: f.color + '12', padding:'8px 6px', textAlign:'center' }}>
                  <div style={{ fontSize:9, color: f.color, fontWeight:700, letterSpacing:'0.05em', marginBottom:4 }}>{f.bytes}</div>
                  <div style={{ fontSize:10, color:'#94a3b8', lineHeight:1.3 }}>{f.label}</div>
                </div>
              ))}
            </div>
          </div>
        );
        if (item.type === 'timeline') return (
          <div key={idx} style={{ marginBottom:12 }}>
            {item.items.map((step, si) => (
              <div key={si} style={{ display:'flex', alignItems:'flex-start', gap:12, marginBottom:8 }}>
                <span style={{ fontSize:10, color: step.danger ? '#ef4444' : step.highlight ? '#22c55e' : '#475569', minWidth:60, paddingTop:2, fontWeight:700 }}>{step.t}</span>
                <div style={{ width:1, background:'#1e293b', alignSelf:'stretch', marginTop:4 }}></div>
                <span style={{ fontSize:12, color: step.danger ? '#fca5a5' : step.highlight ? '#86efac' : '#64748b', lineHeight:1.5 }}>{step.label}</span>
              </div>
            ))}
          </div>
        );
        if (item.type === 'flow') return (
          <div key={idx} style={{ marginBottom:12 }}>
            {item.steps.map((step, si) => (
              <div key={si} style={{ display:'flex', alignItems:'center', gap:8, marginBottom:6 }}>
                <span style={{ fontSize:10, color:'#475569', minWidth:20, textAlign:'right' }}>{si+1}</span>
                <div style={{ background:'#111827', border:'1px solid #1e293b', borderRadius:6, padding:'8px 14px', fontSize:12, color:'#94a3b8', flex:1 }}>{step}</div>
                {si < item.steps.length - 1 && <span style={{ color:'#334155', fontSize:16 }}>↓</span>}
              </div>
            ))}
          </div>
        );
        return null;
      };

      return (
        <div style={{ marginBottom:8, border:'1px solid #1e293b', borderRadius:8, overflow:'hidden' }}>
          <button
            onClick={() => setOpen(!open)}
            style={{ width:'100%', textAlign:'left', padding:'12px 16px', background: open ? '#111827' : 'rgba(255,255,255,0.02)', border:'none', cursor:'pointer', display:'flex', justifyContent:'space-between', alignItems:'center', color:'#e2e8f0' }}
          >
            <span style={{ fontSize:13, fontWeight:600 }}>{section.title}</span>
            <span style={{ color:'#475569', fontSize:16, transform: open ? 'rotate(180deg)' : 'none', transition:'transform 0.2s' }}>▾</span>
          </button>
          {open && (
            <div style={{ padding:'16px', borderTop:'1px solid #1e293b', background:'rgba(0,0,0,0.3)' }}>
              {section.content.map(renderContent)}
            </div>
          )}
        </div>
      );
    }

    function Concepts() {
      const [active, setActive] = useState(0);
      const concept = concepts[active];

      return (
        <div style={{ display:'flex', flexDirection:'column', minHeight:'100vh', background:'#0d0d1a', color:'#e2e8f0', fontFamily:"'JetBrains Mono','Fira Code',monospace" }}>
          {/* Header */}
          <header style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'14px 24px', borderBottom:'1px solid #1e293b', background:'rgba(13,13,26,0.95)', position:'sticky', top:0, zIndex:10 }}>
            <span style={{ fontSize:13, fontWeight:700, color:'#f1f5f9' }}>Core Concepts Reference · Cementite</span>
            <a href="index.html" style={{ fontSize:11, color:'#475569', textDecoration:'none', padding:'4px 10px', border:'1px solid #1e293b', borderRadius:6 }}>← Back</a>
          </header>

          <div style={{ display:'flex', flex:1, overflow:'hidden' }}>
            {/* Sidebar */}
            <div style={{ width:220, background:'#080b14', borderRight:'1px solid #1e293b', padding:'16px 0', position:'sticky', top:53, height:'calc(100vh - 53px)', overflowY:'auto', flexShrink:0 }}>
              {concepts.map((c, i) => (
                <div
                  key={c.id}
                  onClick={() => setActive(i)}
                  style={{ padding:'10px 16px', cursor:'pointer', borderLeft:`2px solid ${active === i ? c.color : 'transparent'}`, background: active === i ? 'rgba(255,255,255,0.04)' : 'transparent', transition:'all 0.15s' }}
                >
                  <div style={{ fontSize:11.5, color: active === i ? '#f1f5f9' : '#94a3b8', lineHeight:1.3, marginBottom:2 }}>{c.title}</div>
                  <div style={{ fontSize:9, color: active === i ? c.color : '#334155', letterSpacing:'0.06em' }}>
                    {c.sections.length} sections
                  </div>
                </div>
              ))}
            </div>

            {/* Main content */}
            <div style={{ flex:1, overflowY:'auto', padding:'32px 40px', maxWidth:820 }}>
              {/* Concept header */}
              <div style={{ marginBottom:28 }}>
                <div style={{ fontSize:10, letterSpacing:'0.14em', color: concept.color, marginBottom:10, fontWeight:700 }}>
                  CONCEPT {String(active+1).padStart(2,'0')} / {concepts.length}
                </div>
                <h1 style={{ fontSize:28, fontWeight:800, color:'#f1f5f9', letterSpacing:'-0.5px', marginBottom:16 }}>{concept.title}</h1>
                {/* TL;DR */}
                <div style={{ background: concept.color + '0f', border:`1px solid ${concept.color}30`, borderRadius:8, padding:'14px 18px', borderLeft:`3px solid ${concept.color}` }}>
                  <div style={{ fontSize:9, letterSpacing:'0.15em', color: concept.color, fontWeight:700, marginBottom:8 }}>TL;DR</div>
                  <div style={{ fontSize:13, color:'#cbd5e1', lineHeight:1.7 }}>{concept.tldr}</div>
                </div>
              </div>

              {/* Sections (accordion) */}
              <div>
                {concept.sections.map((section, i) => (
                  <ConceptSection key={i} section={section} />
                ))}
              </div>

              {/* Next/Prev */}
              <div style={{ display:'flex', justifyContent:'space-between', marginTop:32, paddingTop:20, borderTop:'1px solid #1e293b' }}>
                <button
                  onClick={() => active > 0 && setActive(active - 1)}
                  style={{ fontSize:12, padding:'10px 18px', border:'1px solid #1e293b', borderRadius:8, background: active > 0 ? '#111827' : 'transparent', color: active > 0 ? '#f1f5f9' : '#334155', cursor: active > 0 ? 'pointer' : 'default' }}
                >← Previous</button>
                <span style={{ fontSize:11, color:'#334155', alignSelf:'center' }}>{active + 1} / {concepts.length}</span>
                <button
                  onClick={() => active < concepts.length - 1 && setActive(active + 1)}
                  style={{ fontSize:12, padding:'10px 18px', border:'1px solid #1e293b', borderRadius:8, background: active < concepts.length - 1 ? '#111827' : 'transparent', color: active < concepts.length - 1 ? '#f1f5f9' : '#334155', cursor: active < concepts.length - 1 ? 'pointer' : 'default' }}
                >Next →</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Concepts />);
  </script>
</body>
</html>
