    function BloomMathTab() {
      const [bitsPerKey, setBitsPerKey] = useState(10);

      const computeBloom = (b) => {
        const k = Math.max(1, Math.floor(b * Math.LN2));
        const fp = Math.pow(1 - Math.exp(-k / b), k);
        const ramPerM = (b * 1_000_000) / 8 / 1024; // KB
        const ramPer10M = ramPerM * 10;
        const wastedReads = fp * 1_000_000;
        const wastedIO = wastedReads * 2 * 4096 / 1024 / 1024; // MB
        return { k, fp: (fp * 100).toFixed(3), ramPerM: ramPerM.toFixed(0), ramPer10M: (ramPer10M / 1024).toFixed(2), wastedReads: wastedReads.toFixed(0), wastedIO: wastedIO.toFixed(2) };
      };

            <pre style={{ color:'#7dd3fc', fontSize:12, whiteSpace:'pre', lineHeight:2 }}>{`b = bits_per_key = m / n         (m = total bits, n = number of keys)
k = optimal hash functions = floor(b × ln(2)) ≈ 0.693 × b
p = false positive rate = (1 - e^(-k/b))^k

Two-hash trick (Kirsch-Mitzenmacher 2006):
  h1 = hash_with_seed(key, 0)
  h2 = hash_with_seed(key, 1)
  g_i(key) = (h1 + i × h2) mod m    for i in 0..k
  → Only 2 hash computations regardless of k!`}</pre>

          <pre style={S.code}>{`use std::collections::hash_map::DefaultHasher;
use std::hash::{Hash, Hasher};

pub struct BloomFilter {
    bits: Vec<u8>,
    num_bits: u64,
    num_hashes: u32,
}

impl BloomFilter {
    pub fn new(expected_keys: usize, bits_per_key: u32) -> Self {
        let total_bits = (expected_keys as u64 * bits_per_key as u64).max(64);
        // Round up to next power of two for efficient modulo with bit masking
        let num_bits = total_bits.next_power_of_two();
        let num_bytes = (num_bits / 8) as usize;
        let num_hashes = ((bits_per_key as f64 * 0.693) as u32).max(1);

        BloomFilter {
            bits: vec![0u8; num_bytes],
            num_bits,
            num_hashes,
        }
    }

    fn double_hash(key: &[u8]) -> (u64, u64) {
        // Two independent hashes using DefaultHasher with different seeds
        let mut h1 = DefaultHasher::new();
        0u64.hash(&mut h1);  // seed 0
        key.hash(&mut h1);
        let hash1 = h1.finish();

        let mut h2 = DefaultHasher::new();
        1u64.hash(&mut h2);  // seed 1
        key.hash(&mut h2);
        let hash2 = h2.finish();

        (hash1, hash2)
    }

    pub fn insert(&mut self, key: &[u8]) {
        let (h1, h2) = Self::double_hash(key);
        for i in 0..self.num_hashes {
            // Kirsch-Mitzenmacher: g_i = (h1 + i * h2) mod m
            let bit_idx = h1.wrapping_add((i as u64).wrapping_mul(h2)) & (self.num_bits - 1);
            let byte_idx = (bit_idx / 8) as usize;
            let bit_offset = (bit_idx % 8) as u8;
            self.bits[byte_idx] |= 1 << bit_offset;
        }
    }

    pub fn may_contain(&self, key: &[u8]) -> bool {
        let (h1, h2) = Self::double_hash(key);
        for i in 0..self.num_hashes {
            let bit_idx = h1.wrapping_add((i as u64).wrapping_mul(h2)) & (self.num_bits - 1);
            let byte_idx = (bit_idx / 8) as usize;
            let bit_offset = (bit_idx % 8) as u8;
            if self.bits[byte_idx] & (1 << bit_offset) == 0 {
                return false; // DEFINITELY NOT HERE — no false negatives possible
            }
        }
        true // Probably here (may be false positive)
    }

    // Serialize to bytes for SSTable footer storage
    pub fn to_bytes(&self) -> Vec<u8> {
        let mut out = Vec::with_capacity(8 + 4 + self.bits.len());
        out.extend_from_slice(&self.num_bits.to_le_bytes());
        out.extend_from_slice(&self.num_hashes.to_le_bytes());
        out.extend_from_slice(&self.bits);
        out
    }

    pub fn from_bytes(bytes: &[u8]) -> Option<Self> {
        if bytes.len() < 12 { return None; }
        let num_bits = u64::from_le_bytes(bytes[0..8].try_into().ok()?);
        let num_hashes = u32::from_le_bytes(bytes[8..12].try_into().ok()?);
        Some(BloomFilter {
            bits: bytes[12..].to_vec(),
            num_bits,
            num_hashes,
        })
    }
}

#[cfg(test)]
mod tests {
    use super::*;

    #[test]
    fn no_false_negatives() {
        let mut bloom = BloomFilter::new(1000, 10);
        let keys: Vec<Vec<u8>> = (0..1000).map(|i| format!("key:{i}").into_bytes()).collect();
        for key in &keys { bloom.insert(key); }
        for key in &keys {
            assert!(bloom.may_contain(key), "False negative for key {:?}", key);
        }
    }

    #[test]
    fn false_positive_rate_within_bounds() {
        let n = 10_000;
        let mut bloom = BloomFilter::new(n, 10); // Expect ~1% FP
        for i in 0..n { bloom.insert(format!("key:{i}").as_bytes()); }

        let mut false_positives = 0;
        let queries = 10_000;
        for i in 0..queries {
            // These keys were NOT inserted
            if bloom.may_contain(format!("absent:{i}").as_bytes()) {
                false_positives += 1;
            }
        }
        let fp_rate = false_positives as f64 / queries as f64;
        assert!(fp_rate < 0.05, "FP rate {fp_rate:.3} exceeds 5%");
        println!("Actual FP rate: {:.2}%", fp_rate * 100.0);
    }
}`}</pre>

            <p style={{ fontSize:12.5, color:'#94a3b8', lineHeight:1.8, marginBottom:12 }}>Instead of updating a key's value in place, append a NEW version with a higher sequence number. Readers take a snapshot (capturing the current max sequence number). They see only versions with seq_no ≤ their snapshot.</p>

          <div style={S.label}>GLOBAL SEQUENCE NUMBER + SNAPSHOT MANAGER</div>
          <pre style={S.code}>{`use std::sync::atomic::{AtomicU64, Ordering};
use std::sync::{Arc, Mutex};
use std::collections::BTreeSet;

// Global monotonic counter — every write increments this
static GLOBAL_SEQ: AtomicU64 = AtomicU64::new(0);

fn next_seq() -> u64 { GLOBAL_SEQ.fetch_add(1, Ordering::SeqCst) + 1 }
fn current_seq() -> u64 { GLOBAL_SEQ.load(Ordering::SeqCst) }

pub struct SnapManager {
    active: Mutex<BTreeSet<u64>>,
}

impl SnapManager {
    pub fn new() -> Arc<Self> {
        Arc::new(Self { active: Mutex::new(BTreeSet::new()) })
    }

    pub fn acquire(self: &Arc<Self>) -> Snapshot {
        let seq = current_seq();
        self.active.lock().unwrap().insert(seq);
        Snapshot { seq, mgr: self.clone() }
    }

    fn release(&self, seq: u64) {
        self.active.lock().unwrap().remove(&seq);
    }

    pub fn oldest(&self) -> Option<u64> {
        self.active.lock().unwrap().iter().next().copied()
    }
}

pub struct Snapshot {
    pub seq: u64,
    mgr: Arc<SnapManager>,
}

impl Drop for Snapshot {
    fn drop(&mut self) {
        self.mgr.release(self.seq);
    }
}`}</pre>

          <div style={S.label}>INTERNAL KEY WITH SORT ORDER</div>
          <pre style={S.code}>{`#[derive(Clone, Eq, PartialEq)]
pub struct InternalKey {
    pub user_key: Vec<u8>,
    pub seq_no: u64,
    pub record_type: RecordType,
}

#[derive(Clone, Eq, PartialEq)]
pub enum RecordType { Value, Tombstone }

impl Ord for InternalKey {
    fn cmp(&self, other: &Self) -> std::cmp::Ordering {
        // user_key ASC, seq_no DESC (newest first within same user_key)
        self.user_key.cmp(&other.user_key)
            .then_with(|| other.seq_no.cmp(&self.seq_no))
    }
}
impl PartialOrd for InternalKey {
    fn partial_cmp(&self, other: &Self) -> Option<std::cmp::Ordering> {
        Some(self.cmp(other))
    }
}

impl InternalKey {
    // On-disk: [user_key bytes][8 bytes big-endian: (seq << 8) | type]
    pub fn encode(&self) -> Vec<u8> {
        let type_byte = match self.record_type { RecordType::Value => 1u64, RecordType::Tombstone => 0 };
        let trailer = ((self.seq_no << 8) | type_byte).to_be_bytes();
        [self.user_key.as_slice(), &trailer].concat()
    }
}`}</pre>

          <div style={S.label}>MVCC MEMTABLE: WRITE, DELETE, GET</div>
          <pre style={S.code}>{`use std::collections::BTreeMap;
use parking_lot::RwLock;

pub struct MVCCMemTable {
    data: RwLock<BTreeMap<InternalKey, Vec<u8>>>,
}

impl MVCCMemTable {
    pub fn new() -> Self {
        Self { data: RwLock::new(BTreeMap::new()) }
    }

    pub fn write(&self, user_key: Vec<u8>, value: Vec<u8>) -> u64 {
        let seq = next_seq();
        let key = InternalKey { user_key, seq_no: seq, record_type: RecordType::Value };
        self.data.write().insert(key, value);
        seq
    }

    pub fn delete(&self, user_key: Vec<u8>) -> u64 {
        let seq = next_seq();
        let key = InternalKey { user_key, seq_no: seq, record_type: RecordType::Tombstone };
        self.data.write().insert(key, vec![]); // empty value for tombstone
        seq
    }

    pub fn get(&self, user_key: &[u8], snapshot: &Snapshot) -> Option<Vec<u8>> {
        let data = self.data.read();

        // Seek to (user_key, MAX_SEQ) — will land at or before the newest version
        let seek_key = InternalKey {
            user_key: user_key.to_vec(),
            seq_no: u64::MAX,
            record_type: RecordType::Value,
        };

        // Scan forward from seek position
        for (key, value) in data.range(seek_key..) {
            if key.user_key != user_key {
                break; // Moved past all versions of this key
            }
            if key.seq_no > snapshot.seq {
                continue; // This version is newer than our snapshot — skip
            }
            return match key.record_type {
                RecordType::Value => Some(value.clone()),
                RecordType::Tombstone => None, // Key was deleted
            };
        }
        None // Key not found in this MemTable
    }
}

// PITFALL: Long-running snapshots prevent GC
// Production code should warn if a snapshot is held > 30 seconds:
// if current_seq() - snap.seq > WARN_THRESHOLD && snap_age > Duration::from_secs(30) {
//     warn!("Snapshot held for {:?} — blocking GC, {} versions accumulating", age, count);
// }`}</pre>
