struct IoStats {
    read_bytes: u64,    // Bytes read from storage (after page cache)
    write_bytes: u64,   // Bytes written to storage (before page cache)
    // Note: these are PHYSICAL I/O, not logical. Includes all files.
}

impl IoStats {
    #[cfg(target_os = "linux")]
    fn read() -> std::io::Result<Self> {
        let content = std::fs::read_to_string("/proc/self/io")?;
        let mut stats = IoStats::default();
        for line in content.lines() {
            if let Some(val) = line.strip_prefix("read_bytes: ") {
                stats.read_bytes = val.trim().parse().unwrap_or(0);
            } else if let Some(val) = line.strip_prefix("write_bytes: ") {
                stats.write_bytes = val.trim().parse().unwrap_or(0);
            }
        }
        Ok(stats)
    }

    #[cfg(not(target_os = "linux"))]
    fn read() -> std::io::Result<Self> {
        // macOS: use getrusage or kstat (less accurate)
        Ok(IoStats::default())
    }
}`}</pre>

          <div style={st.label}>AMPLIFICATION MEASUREMENT STRUCT</div>
          <pre style={st.code}>{`struct AmplificationMeasurement {
    start_io: IoStats,
    user_writes: u64,    // Bytes the USER wrote (key + value sizes)
    user_reads: u64,     // Bytes the USER read (value sizes returned)
}

impl AmplificationMeasurement {
    fn start() -> Self {
        Self {
            start_io: IoStats::read().unwrap_or_default(),
            user_writes: 0,
            user_reads: 0,
        }
    }

    fn record_write(&mut self, key: &[u8], value: &[u8]) {
        self.user_writes += (key.len() + value.len()) as u64;
    }

    fn record_read(&mut self, value: &[u8]) {
        self.user_reads += value.len() as u64;
    }

    fn finish(self) -> AmplificationReport {
        // IMPORTANT: fsync before reading end stats!
        // Otherwise OS buffer may not have flushed to device yet
        let end_io = IoStats::read().unwrap_or_default();
        let disk_writes = end_io.write_bytes.saturating_sub(self.start_io.write_bytes);
        let disk_reads = end_io.read_bytes.saturating_sub(self.start_io.read_bytes);

        AmplificationReport {
            write_amp: if self.user_writes > 0 {
                disk_writes as f64 / self.user_writes as f64
            } else { 0.0 },
            read_amp: if self.user_reads > 0 {
                disk_reads as f64 / self.user_reads as f64
            } else { 0.0 },
            user_write_mb: self.user_writes as f64 / 1_048_576.0,
            disk_write_mb: disk_writes as f64 / 1_048_576.0,
        }
    }
}

struct AmplificationReport {
    write_amp: f64,
    read_amp: f64,
    user_write_mb: f64,
    disk_write_mb: f64,
}

impl std::fmt::Display for AmplificationReport {
    fn fmt(&self, f: &mut std::fmt::Formatter) -> std::fmt::Result {
        write!(f,
            "WAF={:.1}× (user={:.1}MB → disk={:.1}MB) | RAF={:.1}×",
            self.write_amp, self.user_write_mb,
            self.disk_write_mb, self.read_amp
        )
    }
}`}</pre>

    let mut total_bytes = 0u64;
    let mut breakdown: std::collections::HashMap<&str, u64> = Default::default();

    for entry in std::fs::read_dir(data_dir).unwrap().flatten() {
        let path = entry.path();
        let size = entry.metadata().map(|m| m.len()).unwrap_or(0);
        total_bytes += size;

        let ext = path.extension()
            .and_then(|e| e.to_str())
            .unwrap_or("other");
        *breakdown.entry(ext).or_insert(0) += size;
    }

    println!("Disk breakdown:");
    for (ext, bytes) in &breakdown {
        println!("  .{ext}: {:.1}MB ({:.1}%)",
            *bytes as f64 / 1_048_576.0,
            *bytes as f64 / total_bytes as f64 * 100.0
        );
    }

    total_bytes as f64 / logical_bytes as f64
}`}</pre>

// Generic trait so you can swap implementations
pub trait KVStore: Send + Sync {

pub struct BenchResult {

    pub p95_us: u64,

impl std::fmt::Display for BenchResult {

        write!(f,
            "{:30} {:>10.0} ops/s  p50={:>5}μs  p99={:>6}μs  p999={:>6}μs  {:>6.1}MB/s",

          <div style={st.label}>ZIPFIAN KEY GENERATOR</div>
          <pre style={st.code}>{`// Simplified Zipfian without rand_distr (pure std)
struct ZipfianGenerator {
    n: usize,
    theta: f64,
    zeta_n: f64,
    zeta_2: f64,
    alpha: f64,
    eta: f64,
}

impl ZipfianGenerator {
    fn new(n: usize) -> Self {
        let theta = 0.99; // Skew parameter
        let zeta_n = (1..=n).map(|i| 1.0 / (i as f64).powf(theta)).sum::<f64>();
        let zeta_2 = 1.0 + 0.5f64.powf(theta);
        let alpha = 1.0 / (1.0 - theta);
        let eta = (1.0 - (2.0 / n as f64).powf(1.0 - theta)) / (1.0 - zeta_2 / zeta_n);
        ZipfianGenerator { n, theta, zeta_n, zeta_2, alpha, eta }
    }

    fn next(&self, u: f64) -> usize {
        // u is uniform random [0, 1)
        let uz = u * self.zeta_n;
        if uz < 1.0 { return 0; }
        if uz < 1.0 + 0.5f64.powf(self.theta) { return 1; }
        (self.n as f64 * (self.eta * u - self.eta + 1.0).powf(self.alpha)) as usize
    }
}

// Fixed-width sortable key format (sortable = 0-padded decimal)
fn format_key(i: usize) -> [u8; 16] {
    let mut buf = [0u8; 16];
    let s = format!("{i:016}");
    buf.copy_from_slice(s.as_bytes());
    buf
}`}</pre>

          <div style={st.label}>CORE BENCHMARK FUNCTIONS</div>
          <pre style={st.code}>{`fn run_benchmark<F: Fn() -> u64>(
    name: &str,
    ops: u64,
    value_size: usize,
    f: F,
) -> BenchResult {
    let mut latencies = Vec::with_capacity(ops as usize);
    let start = Instant::now();
    let mut bytes = 0u64;

    for _ in 0..ops {
        let t0 = Instant::now();
        bytes += f();
        latencies.push(t0.elapsed().as_micros() as u64);
    }

    let duration = start.elapsed();
    latencies.sort_unstable();
    let n = latencies.len();

    BenchResult {
        name: name.to_string(),
        ops,
        duration,
        ops_per_sec: ops as f64 / duration.as_secs_f64(),
        p50_us: latencies[n / 2],
        p95_us: latencies[(n as f64 * 0.95) as usize],
        p99_us: latencies[(n as f64 * 0.99) as usize],
        p999_us: latencies[(n as f64 * 0.999) as usize],
        bytes_total: bytes,
        mb_per_sec: bytes as f64 / duration.as_secs_f64() / 1_048_576.0,
    }
}

fn bench_sequential_write(db: &impl KVStore, n: u64, val_size: usize) -> BenchResult {
    let value = vec![0xABu8; val_size];
    run_benchmark("sequential_write", n, val_size, || {
        static SEQ: std::sync::atomic::AtomicU64 = std::sync::atomic::AtomicU64::new(0);
        let i = SEQ.fetch_add(1, std::sync::atomic::Ordering::Relaxed);
        let key = format_key(i as usize);
        db.set(&key, &value);
        (key.len() + val_size) as u64
    })
}

fn workload_a(db: &impl KVStore, n: u64, key_count: usize) -> BenchResult {
    use std::sync::atomic::{AtomicU64, Ordering};
    static COUNTER: AtomicU64 = AtomicU64::new(0);

    let zipf = ZipfianGenerator::new(key_count);
    let value = vec![0u8; 100];

    run_benchmark("workload_a_50r50w", n, 100, || {
        let i = COUNTER.fetch_add(1, Ordering::Relaxed);
        // Simple LCG for "random" U[0,1)
        let u = ((i.wrapping_mul(6364136223846793005).wrapping_add(1442695040888963407)
            >> 33) as f64) / (u64::MAX >> 31) as f64;
        let key_idx = zipf.next(u.fract());
        let key = format_key(key_idx);
        if i % 2 == 0 {
            db.get(&key);
            key.len() as u64
        } else {
            db.set(&key, &value);
            (key.len() + 100) as u64
        }
    })
}

fn workload_c(db: &impl KVStore, n: u64, key_count: usize) -> BenchResult {
    use std::sync::atomic::{AtomicU64, Ordering};
    static CTR: AtomicU64 = AtomicU64::new(0);
    let zipf = ZipfianGenerator::new(key_count);

    run_benchmark("workload_c_100r", n, 0, || {
        let i = CTR.fetch_add(1, Ordering::Relaxed);
        let u = ((i.wrapping_mul(2862933555777941757).wrapping_add(3037000499)) >> 33) as f64
            / (u64::MAX >> 31) as f64;
        let key = format_key(zipf.next(u.fract()));
        db.get(&key).map(|v| v.len()).unwrap_or(0) as u64
    })
}`}</pre>
