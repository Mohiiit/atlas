<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Storage Models Deep Dive · Cementite KV-DB</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d0d1a; font-family: 'JetBrains Mono','Fira Code',monospace; color: #e2e8f0; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0d0d1a; }
    ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const c = {
      root: { display:'flex', flexDirection:'column', minHeight:'100vh', background:'#0d0d1a', color:'#e2e8f0', fontFamily:"'JetBrains Mono','Fira Code',monospace" },
      header: { display:'flex', alignItems:'center', justifyContent:'space-between', padding:'14px 24px', borderBottom:'1px solid #1e293b', position:'sticky', top:0, background:'rgba(13,13,26,0.97)', zIndex:10, backdropFilter:'blur(8px)' },
      tabBar: { display:'flex', gap:4, padding:'16px 24px', borderBottom:'1px solid #1e293b', background:'#080b14', overflowX:'auto' },
      tab: { padding:'8px 20px', border:'1px solid #1e293b', borderRadius:6, fontSize:12, cursor:'pointer', background:'transparent', color:'#64748b', transition:'all 0.15s', whiteSpace:'nowrap' },
      content: { flex:1, padding:'32px 40px', maxWidth:900, overflowY:'auto' },
      h2: { fontSize:20, fontWeight:700, color:'#f1f5f9', marginBottom:8, letterSpacing:'-0.3px' },
      h3: { fontSize:14, fontWeight:600, color:'#e2e8f0', marginBottom:10, marginTop:24 },
      label: { fontSize:10, letterSpacing:'0.14em', fontWeight:700, color:'#475569', marginBottom:10, marginTop:20 },
      text: { fontSize:12.5, color:'#94a3b8', lineHeight:1.8, marginBottom:12 },
      code: { background:'#070910', border:'1px solid #1e293b', borderRadius:8, padding:'14px 16px', fontSize:11.5, color:'#7dd3fc', lineHeight:1.8, overflowX:'auto', marginBottom:16, whiteSpace:'pre' },
      infoBox: { background:'rgba(255,255,255,0.03)', border:'1px solid #1e293b', borderRadius:8, padding:'14px 18px', marginBottom:16 },
      grid2: { display:'grid', gridTemplateColumns:'1fr 1fr', gap:16, marginBottom:16 },
      card: { background:'#111827', border:'1px solid #1e293b', borderRadius:8, padding:'16px' },
    };

    function ByteFormat({ fields }) {
      return (
        <div style={{ marginBottom:16 }}>
          <div style={{ display:'flex', borderRadius:8, overflow:'hidden', border:'1px solid #1e293b' }}>
            {fields.map((f, i) => (
              <div key={i} style={{ flex: f.flex || 1, minWidth: f.min || 50, borderRight: i < fields.length - 1 ? '1px solid #1e293b' : 'none', background: f.color + '14', padding:'10px 8px', textAlign:'center' }}>
                <div style={{ fontSize:9, color:f.color, fontWeight:700, letterSpacing:'0.06em', marginBottom:5 }}>{f.bytes}</div>
                <div style={{ fontSize:10, color:'#94a3b8', lineHeight:1.4 }}>{f.label}</div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function DataTable({ headers, rows }) {
      return (
        <div style={{ overflowX:'auto', marginBottom:16 }}>
          <table style={{ width:'100%', borderCollapse:'collapse', fontSize:11.5 }}>
            <thead>
              <tr>{headers.map(h => <th key={h} style={{ padding:'9px 14px', background:'#111827', borderBottom:'1px solid #1e293b', color:'#64748b', textAlign:'left', letterSpacing:'0.06em', fontSize:10, whiteSpace:'nowrap' }}>{h}</th>)}</tr>
            </thead>
            <tbody>
              {rows.map((row, ri) => (
                <tr key={ri} style={{ borderBottom:'1px solid #0f172a' }}>
                  {row.map((cell, ci) => (
                    <td key={ci} style={{ padding:'9px 14px', color: ci === 0 ? '#e2e8f0' : '#64748b', background: ri % 2 === 0 ? 'rgba(255,255,255,0.012)' : 'transparent', lineHeight:1.5 }}>{cell}</td>
                  ))}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    function BulletList({ items, color }) {
      return (
        <ul style={{ listStyle:'none', marginBottom:14 }}>
          {items.map((item, i) => (
            <li key={i} style={{ display:'flex', gap:8, alignItems:'flex-start', padding:'3px 0', fontSize:12, color:'#94a3b8', lineHeight:1.7 }}>
              <span style={{ color: color || '#475569', flexShrink:0, marginTop:3 }}>›</span>{item}
            </li>
          ))}
        </ul>
      );
    }

    function BitcaskTab() {
      return (
        <div style={c.content}>
          <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:20 }}>
            <div style={{ width:3, height:32, background:'#4ade80', borderRadius:2 }}></div>
            <div>
              <h2 style={c.h2}>Bitcask</h2>
              <p style={{ fontSize:12, color:'#64748b' }}>Log-structured hash table — 1 disk seek per read, guaranteed</p>
            </div>
          </div>

          <div style={{ ...c.infoBox, borderColor:'rgba(74,222,128,0.2)', borderLeft:'3px solid #4ade80' }}>
            <p style={c.text}>Bitcask was designed by Riak/Basho. The core insight: keep ALL keys in an in-memory hash map (KeyDir), store values sequentially on disk. Every read is exactly ONE disk seek. No tree traversal, no level searching.</p>
          </div>

          <div style={c.label}>ON-DISK RECORD FORMAT (EVERY WRITE IS ONE OF THESE)</div>
          <ByteFormat fields={[
            { label:'CRC32', bytes:'4B', color:'#06b6d4', flex:1 },
            { label:'Timestamp', bytes:'8B', color:'#f59e0b', flex:1.5 },
            { label:'Key Size', bytes:'4B', color:'#8b5cf6', flex:1 },
            { label:'Val Size', bytes:'4B', color:'#8b5cf6', flex:1 },
            { label:'Key', bytes:'variable', color:'#4ade80', flex:2, min:80 },
            { label:'Value', bytes:'variable', color:'#94a3b8', flex:3, min:100 },
          ]} />
          <div style={c.text}>Header = 20 bytes fixed. Val Size = 0xFFFFFFFF → tombstone record (deletion). CRC32 covers all fields after it.</div>

          <div style={c.label}>IN-MEMORY KEYDIR STRUCTURE</div>
          <pre style={c.code}>{`struct KeyDirEntry {
    file_id:    u32,   // Which segment file holds this value
    val_offset: u64,   // Byte offset within that file
    val_size:   u32,   // How many bytes to read
    timestamp:  u64,   // For compaction: keep newest
}
type KeyDir = HashMap<Vec<u8>, KeyDirEntry>;`}</pre>

          <div style={c.grid2}>
            <div style={c.card}>
              <div style={{ fontSize:10, color:'#4ade80', letterSpacing:'0.1em', fontWeight:700, marginBottom:12 }}>READ PATH</div>
              {['1. lookup key in KeyDir → (file_id, offset, val_size)', '2. open segment file by file_id', '3. seek(SeekFrom::Start(offset))', '4. read val_size bytes', '5. verify CRC32', '6. return bytes'].map((s, i) => (
                <div key={i} style={{ fontSize:11.5, color:'#94a3b8', padding:'4px 0', lineHeight:1.5, borderBottom: i < 5 ? '1px solid #1e293b' : 'none' }}>{s}</div>
              ))}
              <div style={{ marginTop:12, fontSize:11, color:'#4ade80', background:'rgba(74,222,128,0.08)', padding:'8px', borderRadius:6, textAlign:'center' }}>ONE DISK SEEK GUARANTEED</div>
            </div>
            <div style={c.card}>
              <div style={{ fontSize:10, color:'#fb923c', letterSpacing:'0.1em', fontWeight:700, marginBottom:12 }}>WRITE PATH</div>
              {['1. construct record bytes', '2. append to active segment file', '3. update KeyDir in memory', '(NEVER modify existing data!)', '', 'On active file > 64MB:', '→ close (now immutable)', '→ open new active file'].map((s, i) => (
                <div key={i} style={{ fontSize:11.5, color: s.startsWith('(') ? '#475569' : '#94a3b8', padding:'4px 0', lineHeight:1.5, borderBottom: i < 7 && s ? '1px solid #1e293b' : 'none' }}>{s}</div>
              ))}
            </div>
          </div>

          <div style={c.label}>COMPACTION PROCESS</div>
          <BulletList color="#4ade80" items={[
            'Scan ALL immutable segment files',
            'For each key: keep only the entry with the NEWEST timestamp',
            'Write surviving entries to new clean segment file(s)',
            'Update KeyDir with new file_id and offset values',
            'Delete old segment files',
          ]} />

          <div style={c.label}>HINT FILES (FAST STARTUP)</div>
          <ByteFormat fields={[
            { label:'Key Size', bytes:'4B', color:'#f59e0b', flex:1 },
            { label:'File ID', bytes:'4B', color:'#06b6d4', flex:1 },
            { label:'Offset', bytes:'8B', color:'#8b5cf6', flex:1.5 },
            { label:'Timestamp', bytes:'8B', color:'#ec4899', flex:1.5 },
            { label:'Key', bytes:'variable', color:'#4ade80', flex:2 },
          ]} />
          <div style={c.text}>Written alongside merged segment files. Contains key + metadata ONLY (no values). On startup, scan hint files to rebuild KeyDir in milliseconds instead of reading all values.</div>

          <div style={c.label}>HARD LIMITATIONS</div>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:12, marginBottom:16 }}>
            {[
              { title:'ALL keys in RAM', desc:'KeyDir must hold every key. 100M keys × avg 50B = 5GB RAM minimum.', color:'#ef4444' },
              { title:'No range scans', desc:'HashMap has no ordering. scan("a".."z") is impossible without full scan.', color:'#ef4444' },
              { title:'Large keyspace', desc:'Not suited when key count × key_size > available RAM.', color:'#ef4444' },
            ].map(lim => (
              <div key={lim.title} style={{ background:'rgba(239,68,68,0.05)', border:'1px solid rgba(239,68,68,0.15)', borderRadius:8, padding:'14px' }}>
                <div style={{ fontSize:11, fontWeight:700, color:'#fca5a5', marginBottom:8 }}>{lim.title}</div>
                <div style={{ fontSize:11.5, color:'#94a3b8', lineHeight:1.6 }}>{lim.desc}</div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function LSMTab() {
      return (
        <div style={c.content}>
          <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:20 }}>
            <div style={{ width:3, height:32, background:'#60a5fa', borderRadius:2 }}></div>
            <div>
              <h2 style={c.h2}>LSM-Tree</h2>
              <p style={{ fontSize:12, color:'#64748b' }}>Log-structured merge tree — never update in place, buffer in memory, flush sorted</p>
            </div>
          </div>

          <div style={{ ...c.infoBox, borderColor:'rgba(96,165,250,0.2)', borderLeft:'3px solid #60a5fa' }}>
            <p style={c.text}>LSM is the dominant storage model in modern databases (RocksDB, Cassandra, TiKV). Key insight: never update data in place. Buffer writes in a sorted in-memory structure (MemTable), periodically flush as immutable sorted files (SSTables), merge them in the background.</p>
          </div>

          <div style={c.label}>MEMTABLE — IN-MEMORY WRITE BUFFER</div>
          <pre style={c.code}>{`// BTreeMap keeps keys sorted — critical for SSTable flush
type MemTable = BTreeMap<InternalKey, Entry>;

enum Entry {
    Value(Vec<u8>),
    Tombstone,  // deletion marker
}

// When MemTable hits ~4-64MB:
// 1. Freeze it (make immutable)
// 2. Create new empty MemTable for writes
// 3. Background thread flushes frozen MemTable to SSTable`}</pre>

          <div style={c.label}>WAL — MEMTABLE DURABILITY</div>
          <div style={c.text}>Every write goes to WAL + fsync BEFORE updating MemTable. On crash: MemTable is gone, but WAL lets us reconstruct it. WAL file is deleted once MemTable is safely flushed to an SSTable.</div>

          <div style={c.label}>SSTABLE INTERNAL LAYOUT</div>
          <div style={{ background:'#0a0c10', border:'1px solid #1e293b', borderRadius:8, padding:'16px', marginBottom:16, fontFamily:"'JetBrains Mono',monospace", fontSize:11.5 }}>
            <pre style={{ color:'#7dd3fc', whiteSpace:'pre', lineHeight:1.8 }}>{`┌────────────────────────────────────────────────┐
│  Data Block 0  (4KB, sorted KV pairs)          │  ← 'apple' ... 'fig'
├────────────────────────────────────────────────┤
│  Data Block 1  (4KB, sorted KV pairs)          │  ← 'grape' ... 'mango'
├────────────────────────────────────────────────┤
│  ...                                           │
├────────────────────────────────────────────────┤
│  Index Block   (first_key → block_offset)      │  ← binary search
├────────────────────────────────────────────────┤
│  Bloom Filter  (10 bits/key, ~1% FP)           │  ← "definitely NOT here"
├────────────────────────────────────────────────┤
│  Footer (48B)  bloom_offset | index_offset     │  ← file entry point
│                | magic: 0xDB4775248B80FB57     │
└────────────────────────────────────────────────┘`}</pre>
          </div>

          <div style={c.label}>LEVEL STRUCTURE</div>
          <div style={{ display:'flex', flexDirection:'column', gap:6, marginBottom:16 }}>
            {[
              { level:'L0', desc:'4 files, may OVERLAP, direct flushes from MemTable', size:'~16MB', color:'#ef4444' },
              { level:'L1', desc:'Non-overlapping, sorted key ranges, no key spans two files', size:'10MB', color:'#f97316' },
              { level:'L2', desc:'10× larger than L1, same non-overlapping constraint', size:'100MB', color:'#f59e0b' },
              { level:'L3', desc:'10× larger than L2', size:'1GB', color:'#22c55e' },
              { level:'L4', desc:'...', size:'10GB', color:'#06b6d4' },
              { level:'L5', desc:'...', size:'100GB', color:'#8b5cf6' },
            ].map(lv => (
              <div key={lv.level} style={{ display:'flex', gap:12, alignItems:'center' }}>
                <span style={{ fontSize:11, fontWeight:700, color: lv.color, minWidth:24 }}>{lv.level}</span>
                <div style={{ flex:1, background:'#111827', border:'1px solid #1e293b', borderRadius:6, padding:'8px 14px', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                  <span style={{ fontSize:11.5, color:'#94a3b8' }}>{lv.desc}</span>
                  <span style={{ fontSize:11, color: lv.color, fontWeight:700 }}>{lv.size}</span>
                </div>
              </div>
            ))}
          </div>

          <div style={c.grid2}>
            <div style={c.card}>
              <div style={{ fontSize:10, color:'#60a5fa', letterSpacing:'0.1em', fontWeight:700, marginBottom:12 }}>READ PATH (best → worst case)</div>
              {['Check MemTable → O(log n)', 'Check immutable MemTables', 'L0: check Bloom ALL files (may overlap)', 'L1+: check Bloom, binary search manifest → ONE file', 'Open SSTable, read index → find block', 'Read + decompress 4KB data block', 'Scan block for key'].map((s, i) => (
                <div key={i} style={{ fontSize:11, color:'#94a3b8', padding:'4px 0', lineHeight:1.5, borderBottom: i < 6 ? '1px solid #1e293b' : 'none' }}>{s}</div>
              ))}
            </div>
            <div style={c.card}>
              <div style={{ fontSize:10, color:'#fb923c', letterSpacing:'0.1em', fontWeight:700, marginBottom:12 }}>COMPACTION ALGORITHM</div>
              {['Pick 1 SSTable from level Ln', 'Find ALL overlapping SSTables in Ln+1', 'Merge-sort all entries', 'Key dedup: keep newest seq_no', 'Write new Ln+1 SSTable files', 'Update MANIFEST (atomic rename)', 'Delete input SSTables'].map((s, i) => (
                <div key={i} style={{ fontSize:11, color:'#94a3b8', padding:'4px 0', lineHeight:1.5, borderBottom: i < 6 ? '1px solid #1e293b' : 'none' }}>{s}</div>
              ))}
            </div>
          </div>

          <div style={c.label}>AMPLIFICATION</div>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:12 }}>
            {[['WRITE AMP', '10-30×', 'Keys rewritten as they move down levels', '#fb923c'], ['READ AMP', '1-7×', 'Bloom filters reduce most misses to 1-2', '#60a5fa'], ['SPACE AMP', '~1.1×', 'Leveled keeps size tightly bounded', '#a78bfa']].map(([label, val, desc, color]) => (
              <div key={label} style={{ background:'#111827', border:'1px solid #1e293b', borderRadius:8, padding:'14px', textAlign:'center' }}>
                <div style={{ fontSize:10, color:'#475569', letterSpacing:'0.08em', marginBottom:6 }}>{label}</div>
                <div style={{ fontSize:18, fontWeight:800, color, marginBottom:8 }}>{val}</div>
                <div style={{ fontSize:11, color:'#64748b', lineHeight:1.5 }}>{desc}</div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function BTreeTab() {
      return (
        <div style={c.content}>
          <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:20 }}>
            <div style={{ width:3, height:32, background:'#fbbf24', borderRadius:2 }}></div>
            <div>
              <h2 style={c.h2}>B-Tree</h2>
              <p style={{ fontSize:12, color:'#64748b' }}>Balanced tree with in-place updates — PostgreSQL, MySQL, LMDB, SQLite</p>
            </div>
          </div>

          <div style={{ ...c.infoBox, borderColor:'rgba(251,191,36,0.2)', borderLeft:'3px solid #fbbf24' }}>
            <p style={c.text}>B-Trees are the classic database structure. Every leaf node is at the same depth. Nodes map to 4KB disk pages (one OS page = one tree node). Reads are 3-4 disk seeks. Writes are random in-place modifications.</p>
          </div>

          <div style={c.label}>NODE STRUCTURE (ONE NODE = ONE 4KB DISK PAGE)</div>
          <pre style={c.code}>{`// Internal node: holds keys + child pointers
struct BTreeNode {
    num_keys: u16,                   // How many keys in this node
    keys: Vec<Vec<u8>>,              // Sorted keys
    children: Vec<PageId>,           // Pointers to child pages
    // Typical fanout: 100-1000 (depends on key size)
    // Height 3 → 100^3 = 1B+ records with 3 disk reads
}

// Leaf node: holds actual key-value pairs
struct BTreeLeaf {
    pairs: Vec<(Vec<u8>, Vec<u8>)>,  // Sorted KV pairs
    next_leaf: Option<PageId>,       // Linked list for range scans!
}`}</pre>

          <div style={c.grid2}>
            <div style={c.card}>
              <div style={{ fontSize:10, color:'#fbbf24', letterSpacing:'0.1em', fontWeight:700, marginBottom:12 }}>READ PATH</div>
              {['Load root page (often in page cache)', 'Compare key: go left/right child', 'Load child page (disk read if not cached)', 'Repeat until leaf (height-3 = 3 reads)', 'Scan leaf for exact key', 'Page cache: upper nodes STAY in RAM', '→ usually only 1 physical disk read'].map((s, i) => (
                <div key={i} style={{ fontSize:11, color: i >= 5 ? '#22c55e' : '#94a3b8', padding:'4px 0', lineHeight:1.5, borderBottom: i < 6 ? '1px solid #1e293b' : 'none' }}>{s}</div>
              ))}
            </div>
            <div style={c.card}>
              <div style={{ fontSize:10, color:'#fb923c', letterSpacing:'0.1em', fontWeight:700, marginBottom:12 }}>WRITE PATH</div>
              {['Traverse to leaf (3-4 reads)', 'Modify page IN PLACE (random write!)', 'If page overflows: split page', '→ update parent with new separator key', '→ parent might overflow too (cascade)', '→ worst case: split up to root', 'Write O(height) dirty pages'].map((s, i) => (
                <div key={i} style={{ fontSize:11, color: i >= 2 ? '#fca5a5' : '#94a3b8', padding:'4px 0', lineHeight:1.5, borderBottom: i < 6 ? '1px solid #1e293b' : 'none' }}>{s}</div>
              ))}
            </div>
          </div>

          <div style={c.label}>WHY RANDOM WRITES ARE SLOW</div>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:12, marginBottom:16 }}>
            {[
              { title:'HDD', desc:'Seek time 5-10ms per random write. B-Tree at 5000 updates/sec = spending most time seeking.', color:'#ef4444' },
              { title:'SATA SSD', desc:'No physical seek, but erase-before-write. Flash blocks are 128-512KB — write 4KB, erase 512KB first.', color:'#f97316' },
              { title:'NVMe SSD', desc:'Faster (0.05-0.2ms), but random writes still cause device-level write amplification (3-5×).', color:'#f59e0b' },
            ].map(item => (
              <div key={item.title} style={{ background:'#111827', border:'1px solid #1e293b', borderRadius:8, padding:'14px' }}>
                <div style={{ fontSize:11, fontWeight:700, color: item.color, marginBottom:8 }}>{item.title}</div>
                <div style={{ fontSize:11.5, color:'#94a3b8', lineHeight:1.6 }}>{item.desc}</div>
              </div>
            ))}
          </div>

          <div style={c.label}>LMDB VARIANT: COPY-ON-WRITE B-TREE</div>
          <pre style={c.code}>{`// LMDB never modifies existing pages!
// On write: copy the path from root to target leaf
// Old pages remain valid (readers still using them are fine)
//
// Write path:
// 1. Copy leaf page → new_leaf (modify new copy)
// 2. Copy parent → new_parent (update child pointer to new_leaf)
// 3. Copy root → new_root (update child to new_parent)
// 4. Atomic: flip "current root" pointer
//
// Result: readers are COMPLETELY LOCK-FREE
// Old tree version stays valid until readers are done`}</pre>
          <div style={c.text}>Write amplification is O(tree height) per write, but LMDB is extremely popular for read-heavy workloads with infrequent writes. Used in: OpenLDAP, Tor, many embedded use cases.</div>
        </div>
      );
    }

    function CompareTab() {
      const rows = [
        ['Storage model', 'Log-structured hash table', 'Log-structured merge tree', 'Balanced tree (in-place)'],
        ['Write throughput', '★★★★★ Sequential disk', '★★★★★ Sequential disk', '★★★☆☆ Random I/O penalty'],
        ['Read throughput', '★★★★★ 1 seek guaranteed', '★★★☆☆ 1-7 reads (Bloom helps)', '★★★★★ 3-4 reads, cached'],
        ['Range scans', '✗ None (hash map)', '✓ Good (sorted SSTables)', '✓ Excellent (leaf chain)'],
        ['Keys fit in RAM?', '⚠ Required — ALL keys', '✓ No — just MemTable', '✓ No — page cache'],
        ['Write amplification', '~1× (append only)', '10-30× (leveled)', '2-5× (page splits)'],
        ['Read amplification', '1× guaranteed', '1-10× (Bloom filters help)', '1-3× (page cache helps)'],
        ['Space amplification', '~2× during compaction', '~1.1× (leveled)', '~1.3× (fragmentation)'],
        ['Crash recovery', 'Scan datafile / hint files', 'Replay WAL → MemTable', 'Undo log / WAL / journal'],
        ['Concurrency', 'RwLock on KeyDir', 'MVCC + MemTable lock', 'Page-level locks / MVCC'],
        ['Real DBs', 'Riak, Bitcask (original)', 'RocksDB, Cassandra, TiKV, ScyllaDB', 'PostgreSQL, MySQL InnoDB, LMDB, SQLite'],
        ['Best for', 'Small keyspace, high write+read throughput', 'Large data, write-heavy, time-series', 'Read-heavy, OLTP, ACID transactions'],
      ];

      const colColors = ['#94a3b8', '#4ade80', '#60a5fa', '#fbbf24'];

      return (
        <div style={c.content}>
          <div style={{ marginBottom:24 }}>
            <h2 style={{ ...c.h2, marginBottom:8 }}>Side-by-Side Comparison</h2>
            <p style={{ fontSize:12, color:'#64748b' }}>All three models at a glance. Every cell matters for your choice.</p>
          </div>

          <div style={{ display:'flex', gap:12, marginBottom:24 }}>
            {[['Bitcask', '#4ade80', 'Riak, Bitcask'], ['LSM-Tree', '#60a5fa', 'RocksDB, Cassandra'], ['B-Tree', '#fbbf24', 'PostgreSQL, MySQL']].map(([name, color, dbs]) => (
              <div key={name} style={{ flex:1, background:'#111827', border:`1px solid ${color}30`, borderRadius:8, padding:'14px', borderTop:`2px solid ${color}` }}>
                <div style={{ fontSize:14, fontWeight:700, color, marginBottom:4 }}>{name}</div>
                <div style={{ fontSize:11, color:'#475569' }}>{dbs}</div>
              </div>
            ))}
          </div>

          <div style={{ overflowX:'auto' }}>
            <table style={{ width:'100%', borderCollapse:'collapse', fontSize:11.5 }}>
              <thead>
                <tr>
                  <th style={{ padding:'10px 14px', background:'#0a0c10', borderBottom:'1px solid #1e293b', color:'#334155', textAlign:'left', width:'18%' }}>METRIC</th>
                  {['BITCASK', 'LSM-TREE', 'B-TREE'].map((h, i) => (
                    <th key={h} style={{ padding:'10px 14px', background:'#0a0c10', borderBottom:`2px solid ${colColors[i+1]}`, color: colColors[i+1], textAlign:'left', width:'27%', letterSpacing:'0.08em', fontSize:10 }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {rows.map((row, ri) => (
                  <tr key={ri} style={{ borderBottom:'1px solid #0f172a' }}>
                    {row.map((cell, ci) => (
                      <td key={ci} style={{
                        padding:'10px 14px',
                        color: ci === 0 ? '#64748b' : '#94a3b8',
                        background: ri % 2 === 0 ? 'rgba(255,255,255,0.015)' : 'transparent',
                        fontWeight: ci === 0 ? 600 : 400,
                        fontSize: ci === 0 ? 10 : 11.5,
                        letterSpacing: ci === 0 ? '0.06em' : 0,
                        verticalAlign:'top',
                        lineHeight:1.6,
                      }}>{cell}</td>
                    ))}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          <div style={{ marginTop:24, background:'rgba(255,255,255,0.02)', border:'1px solid #1e293b', borderRadius:8, padding:'18px' }}>
            <div style={{ fontSize:10, color:'#475569', letterSpacing:'0.14em', fontWeight:700, marginBottom:12 }}>DECISION FRAMEWORK</div>
            <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:16 }}>
              {[
                { title:'Choose Bitcask when', color:'#4ade80', items:['Write+read throughput >> everything', 'Key count fits in RAM', 'Simple use case', 'No range scans needed', 'Example: cache, session store'] },
                { title:'Choose LSM when', color:'#60a5fa', items:['Writes >> reads', 'Dataset >> available RAM', 'Time-series or event logs', 'Can tolerate background I/O', 'Example: metrics, user events'] },
                { title:'Choose B-Tree when', color:'#fbbf24', items:['Reads >> writes', 'ACID transactions needed', 'Predictable latency critical', 'Complex SQL/joins', 'Example: OLTP, banking'] },
              ].map(item => (
                <div key={item.title} style={{ background:'#111827', border:'1px solid #1e293b', borderRadius:8, padding:'14px' }}>
                  <div style={{ fontSize:11, fontWeight:700, color: item.color, marginBottom:10 }}>{item.title}</div>
                  {item.items.map((li, i) => (
                    <div key={i} style={{ fontSize:11.5, color:'#64748b', padding:'3px 0', paddingLeft:10, position:'relative', lineHeight:1.5 }}>
                      <span style={{ position:'absolute', left:0, color: item.color }}>›</span>{li}
                    </div>
                  ))}
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    const tabs = [
      { id:'bitcask', label:'Bitcask', color:'#4ade80', component: BitcaskTab },
      { id:'lsm', label:'LSM-Tree', color:'#60a5fa', component: LSMTab },
      { id:'btree', label:'B-Tree', color:'#fbbf24', component: BTreeTab },
      { id:'compare', label:'Compare All', color:'#c084fc', component: CompareTab },
    ];

    function StorageModels() {
      const [active, setActive] = useState(0);
      const Tab = tabs[active].component;

      return (
        <div style={c.root}>
          <header style={c.header}>
            <span style={{ fontSize:13, fontWeight:700, color:'#f1f5f9' }}>Storage Models Deep Dive · Cementite</span>
            <a href="index.html" style={{ fontSize:11, color:'#475569', textDecoration:'none', padding:'4px 10px', border:'1px solid #1e293b', borderRadius:6 }}>← Back</a>
          </header>
          <div style={c.tabBar}>
            {tabs.map((t, i) => (
              <button
                key={t.id}
                onClick={() => setActive(i)}
                style={{
                  ...c.tab,
                  borderColor: active === i ? t.color + '60' : '#1e293b',
                  color: active === i ? t.color : '#64748b',
                  background: active === i ? t.color + '12' : 'transparent',
                  fontWeight: active === i ? 700 : 400,
                }}
              >{t.label}</button>
            ))}
          </div>
          <Tab />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<StorageModels />);
  </script>
</body>
</html>
